<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meine Visitenkarte</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 30px 40px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 400px;
      text-align: center;
    }

    .card h1 {
      font-size: 2em;
      margin-bottom: 10px;
      color: #0073e6;
    }

    .card h2 {
      font-size: 1.2em;
      margin-bottom: 20px;
      font-weight: normal;
      color: #555;
    }

    .card p {
      margin-bottom: 10px;
      font-size: 1em;
    }

    .card a {
      color: #0073e6;
      text-decoration: none;
    }

    .card a:hover {
      text-decoration: underline;
    }

    .social-links {
      margin-top: 20px;
    }

    .social-links a {
      margin: 0 10px;
      font-size: 1.5em;
      display: inline-block;
      transition: transform 0.2s;
    }

    .social-links a:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Surendran Nair</h1>
    <h2>Diplom Wirtschaftsingenieur (FH)</h2>
    <p>Email: <a href="mailto:mail@snair.de">mail@snair.de</a></p>
    <div class="social-links">
      <a href="https://linkedin.com/in/nairsuri" target="_blank">LinkedIn</a>
    </div>
  </div>
</body>
</html>
