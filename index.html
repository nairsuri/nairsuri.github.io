<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surendran Nair – Visitenkarte</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h1 {
      font-size: 2em;
      margin-bottom: 10px;
      color: #fff;
    }

    .card h2 {
      font-size: 1.2em;
      font-weight: normal;
      margin-bottom: 20px;
      color: #e0e0e0;
    }

    .card p {
      margin-bottom: 15px;
      font-size: 1em;
    }

    .card a.button {
      display: inline-block;
      margin: 10px 5px;
      padding: 10px 20px;
      border-radius: 50px;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card a.button:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .social-links {
      margin-top: 25px;
    }

    .social-links a {
      margin: 0 10px;
      font-size: 1.5em;
      color: #fff;
      text-decoration: none;
      transition: transform 0.2s;
    }

    .social-links a:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Surendran Nair</h1>
    <h2>Diplom Wirtschaftsingenieur(FH)</h2>
    <p>Email: <a href="mailto:mail@snair.de">mail@snair.de</a></p>
    <div class="social-links">
      <a href="https://linkedin.com/in/nairsuri" target="_blank">LinkedIn</a>
    </div>
  </div>
</body>
</html>
